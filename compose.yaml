services:
  frontend:
    image: docker.io/oven/bun:1-debian
    working_dir: /app
    volumes:
      - .:/app
    command: bash -c "bun install && bun run web:guest"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_PROXY_TARGET=http://backend:8788
      - VITE_DISABLE_AUTH=true
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:5173/').then(r => process.exit(r.ok ? 0 : 1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    image: docker.io/node:22-bookworm-slim
    working_dir: /app
    volumes:
      - .:/app
      - /app/.wrangler
    command: bash -c "apt-get update && apt-get install -y curl unzip && curl -fsSL https://bun.sh/install | bash && export PATH=\"$$HOME/.bun/bin:$$PATH\" && bun install && npm run dev:backend:guest"
    ports:
      - "8788:8788"
    environment:
      - DISABLE_CLERK_AUTH=true
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8788/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
